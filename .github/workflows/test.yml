name: API 自动化测试

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 安装 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        pip install -r requirements.txt

    - name: 创建配置文件
      run: |
        echo "base_url: 'https://nj65np8ukv.re.qweatherapi.com/v7'" > config/config.yaml
        echo "geo_url: 'https://nj65np8ukv.re.qweatherapi.com'" >> config/config.yaml
        echo "api_key: '${{ secrets.QWEATHER_API_KEY }}'" >> config/config.yaml

    - name: 运行测试
      run: pytest -v --alluredir=allure-results

    - name: 上传 Allure 报告
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: allure-report
        path: allure-results/